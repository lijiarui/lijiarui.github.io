<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>站点数据 · 搭建中</title>
<style>
:root {
  --bg: #fafaf7;
  --ink: #1f1f1f;
  --ink-mute: #888;
  --rule: #e5e1d8;
  --accent: #D26911;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.7;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  max-width: 520px;
  padding: 36px 28px;
}
h1 {
  font-size: 24px;
  margin: 0 0 12px;
  letter-spacing: -0.01em;
  color: var(--accent);
}
p { color: var(--ink-mute); margin: 0 0 8px; }
.note {
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid var(--rule);
  font-size: 13px;
}
a { color: var(--accent); text-decoration: none; }
a:hover { border-bottom: 1px solid var(--accent); }
</style>
</head>
<body>
<div class="container">
  <h1>站点数据 · 搭建中</h1>
  <p>真实统计还没接入，所以这里暂时空着。</p>
  <p>不展示也不上估算，回头见。</p>
  <div class="note">
    <p>← <a href="/">返回首页</a></p>
  </div>
</div>
</body>
</html>
